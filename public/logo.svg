<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0D1B36"/>
      <stop offset="100%" stop-color="#060A14"/>
    </linearGradient>
    <linearGradient id="wA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <clipPath id="cpA"><rect x="0" y="0" width="72" height="72" rx="16"/></clipPath>
  </defs>
  <!-- Badge -->
  <rect x="0" y="0" width="72" height="72" rx="16" fill="url(#bgA)"/>
  <g clip-path="url(#cpA)">
    <!-- 3x3 grid - dim squares -->
    <rect x="10" y="10" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <rect x="29" y="10" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <rect x="48" y="10" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <rect x="10" y="29" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <rect x="29" y="29" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <rect x="48" y="29" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <rect x="10" y="48" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <rect x="29" y="48" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <rect x="48" y="48" width="14" height="14" rx="3.5" fill="#1B3460"/>
    <!-- Lit squares on diagonal -->
    <rect x="48" y="10" width="14" height="14" rx="3.5" fill="#164E75" stroke="#38BDF8" stroke-width="0.8"/>
    <rect x="29" y="29" width="14" height="14" rx="3.5" fill="#164E75" stroke="#38BDF8" stroke-width="0.8"/>
    <rect x="10" y="48" width="14" height="14" rx="3.5" fill="#164E75" stroke="#38BDF8" stroke-width="0.8"/>
    <!-- Rift slash -->
    <line x1="66" y1="8" x2="6" y2="66" stroke="#1A6FD8" stroke-width="16" stroke-linecap="round" opacity="0.10"/>
    <line x1="66" y1="8" x2="6" y2="66" stroke="#1EAAEE" stroke-width="9" stroke-linecap="round" opacity="0.18"/>
    <line x1="66" y1="8" x2="6" y2="66" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <line x1="66" y1="8" x2="6" y2="66" stroke="#7DD8FB" stroke-width="1.6" stroke-linecap="round" opacity="0.90"/>
    <line x1="66" y1="8" x2="6" y2="66" stroke="#FFFFFF" stroke-width="0.6" stroke-linecap="round" opacity="0.65"/>
    <circle cx="66" cy="8"  r="2.8" fill="#38BDF8" opacity="0.75"/>
    <circle cx="66" cy="8"  r="1.1" fill="white"   opacity="0.9"/>
    <circle cx="6"  cy="66" r="2.2" fill="#38BDF8" opacity="0.50"/>
    <circle cx="6"  cy="66" r="0.9" fill="white"   opacity="0.65"/>
  </g>
  <!-- Badge border -->
  <rect x="0.5" y="0.5" width="71" height="71" rx="15.5" fill="none" stroke="#1A3A6A" stroke-width="0.8" opacity="0.7"/>
  <!-- Top sheen -->
  <rect x="10" y="0.8" width="26" height="1.2" rx="0.6" fill="white" opacity="0.05"/>
  <!-- Wordmark -->
  <text x="88" y="30"
    font-family="'Sora','DM Sans',system-ui,sans-serif"
    font-size="21" font-weight="700"
    fill="#8097B8" letter-spacing="3">TOOLS</text>
  <text x="88" y="60"
    font-family="'Sora','DM Sans',system-ui,sans-serif"
    font-size="32" font-weight="800"
    fill="url(#wA)" letter-spacing="-0.5">Rift</text>
  <line x1="88" y1="65" x2="180" y2="65" stroke="url(#wA)" stroke-width="1.5" stroke-linecap="round" opacity="0.30"/>
</svg>
